  - from: olve-maudal-tribute
    to: baseline-report
    type: supports

  - from: jz09-official-backstory
    to: javazone-timeline
    type: supports

  - from: forum-snapshots
    to: pre-cibus-era
    type: supports

  - from: homepage-timeline
    to: baseline-report
    type: supports

  - from: technical-infrastructure
    to: pre-cibus-era
